<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0f0f13"/>
  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M 72 0 L 0 0 0 72" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="blob1" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0f0f13" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="10%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0f0f13" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#blob1)"/>
  <rect width="1200" height="630" fill="url(#blob2)"/>
  <!-- Logo mark -->
  <circle cx="96" cy="96" r="40" fill="#1a1a22" stroke="#2e2e3e" stroke-width="1"/>
  <text x="96" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="700" text-anchor="middle" fill="#2563eb">M</text>
  <!-- Title -->
  <text x="96" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="700" fill="#e8e8f0" letter-spacing="-1">Motion Components</text>
  <!-- Tagline -->
  <text x="96" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="400" fill="#8888a8">Motion-first web components · Spring physics · Framework-agnostic</text>
  <!-- Accent bar -->
  <rect x="96" y="280" width="80" height="4" rx="2" fill="#2563eb"/>
</svg>
